<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Enterprise Fleet Management System" />
    <meta name="theme-color" content="#1565C0" />
    <title>Fleet Management System</title>
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/icon?family=Material+Icons"
    />
    <style>
      :root {
        color-scheme: light;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: Inter, Roboto, Helvetica, Arial, sans-serif;
        background: #f4f6f8;
      }

      /* Lock scroll only while the initial HTML splash is visible */
      body:has(#app-splash:not(.app-splash--hide)) {
        overflow: hidden;
      }

      #app-splash {
        position: fixed;
        inset: 0;
        width: 100vw;
        height: 100vh;
        height: 100dvh;
        z-index: 9999;
        display: flex;
        flex-direction: column;
        overflow: hidden;
        background:
          radial-gradient(ellipse 80% 60% at 50% 0%, rgba(21, 101, 192, 0.14) 0%, transparent 60%),
          radial-gradient(ellipse 60% 50% at 100% 100%, rgba(0, 137, 123, 0.1) 0%, transparent 55%),
          linear-gradient(180deg, #e3f2fd 0%, #f4f6f8 50%, #e8f5f3 100%);
        transition: opacity 0.4s ease, visibility 0.4s ease;
      }

      #app-splash.app-splash--hide {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
      }

      #app-splash::before {
        content: '';
        position: absolute;
        inset: 0;
        opacity: 0.06;
        background-image:
          linear-gradient(#1565c0 1px, transparent 1px),
          linear-gradient(90deg, #1565c0 1px, transparent 1px);
        background-size: 48px 48px;
      }

      .app-splash-card {
        flex: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 24px;
        text-align: center;
        animation: app-splash-rise 0.5s ease-out;
      }

      .app-splash-logo {
        width: 88px;
        height: 88px;
        margin: 0 auto 24px;
        border-radius: 16px;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #1565c0;
        box-shadow: 0 20px 60px rgba(21, 101, 192, 0.35);
        animation: app-splash-float 2.6s ease-in-out infinite;
      }

      .app-splash-title {
        margin: 0 0 8px;
        font-size: clamp(2rem, 6vw, 2.75rem);
        font-weight: 800;
        letter-spacing: -0.03em;
        color: #1a2027;
      }

      .app-splash-subtitle {
        margin: 0 0 8px;
        font-size: clamp(0.95rem, 2.5vw, 1.1rem);
        font-weight: 400;
        color: #637381;
      }

      .app-splash-tagline {
        margin: 0;
        font-size: 0.875rem;
        color: #919eab;
        max-width: 360px;
      }

      .app-splash-footer {
        width: 100%;
        padding: 24px clamp(24px, 5vw, 64px) clamp(32px, 5vw, 40px);
        border-top: 1px solid rgba(21, 101, 192, 0.1);
        background: rgba(255, 255, 255, 0.45);
        backdrop-filter: blur(8px);
      }

      .app-splash-footer-row {
        max-width: 720px;
        margin: 0 auto 12px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
      }

      .app-splash-track {
        max-width: 720px;
        margin: 0 auto;
        height: 4px;
        border-radius: 999px;
        overflow: hidden;
        background: rgba(21, 101, 192, 0.12);
      }

      .app-splash-bar {
        height: 100%;
        width: 35%;
        border-radius: 999px;
        background: linear-gradient(90deg, #1565c0 0%, #00897b 100%);
        animation: app-splash-progress 1.8s ease-in-out infinite;
      }

      .app-splash-status {
        margin: 0;
        font-size: 0.875rem;
        font-weight: 500;
        color: #637381;
      }

      .app-splash-percent {
        margin: 0;
        font-size: 0.875rem;
        font-weight: 600;
        color: #919eab;
        min-width: 40px;
        text-align: right;
      }

      @keyframes app-splash-rise {
        from {
          opacity: 0;
          transform: translateY(18px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @keyframes app-splash-float {
        0%,
        100% {
          transform: translateY(0);
        }
        50% {
          transform: translateY(-4px);
        }
      }

      @keyframes app-splash-progress {
        0% {
          transform: translateX(-120%);
        }
        100% {
          transform: translateX(320%);
        }
      }
    </style>
  </head>
  <body>
    <div id="app-splash" aria-live="polite" aria-busy="true">
      <div class="app-splash-card">
        <div class="app-splash-logo" aria-hidden="true">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path
              d="M20 8h-3V4H3c-1.1 0-2 .9-2 2v11h2c0 1.66 1.34 3 3 3s3-1.34 3-3h6c0 1.66 1.34 3 3 3s3-1.34 3-3h2v-5l-3-4zM6 18.5c-.83 0-1.5-.67-1.5-1.5s.67-1.5 1.5-1.5 1.5.67 1.5 1.5-.67 1.5-1.5 1.5zm13.5-9l1.96 2.5H17V9.5h2.5zm-1.5 9c-.83 0-1.5-.67-1.5-1.5s.67-1.5 1.5-1.5 1.5.67 1.5 1.5-.67 1.5-1.5 1.5z"
              fill="#ffffff"
            />
          </svg>
        </div>
        <h1 class="app-splash-title">FleetOps</h1>
        <p class="app-splash-subtitle">Fleet Management System</p>
        <p class="app-splash-tagline">Enterprise fleet tracking, routing, and operations</p>
      </div>
      <div class="app-splash-footer">
        <div class="app-splash-footer-row">
          <p class="app-splash-status">Starting application...</p>
          <p class="app-splash-percent">—</p>
        </div>
        <div class="app-splash-track">
          <div class="app-splash-bar"></div>
        </div>
      </div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
